version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "daily"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      angular-toolchain:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@schematics/angular"
          - "typescript"
          - "zone.js"
          - "rxjs"
      lint-tooling:
        patterns:
          - "eslint"
          - "@typescript-eslint/*"
          - "@angular-eslint/*"
    ignore:
      - dependency-name: "@angular-devkit/build-angular"
        update-types:
          - "version-update:semver-major"
  - package-ecosystem: "npm"
    directory: "/backend/"
    schedule:
      interval: "daily"
